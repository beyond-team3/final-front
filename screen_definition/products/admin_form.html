            transition: transform 0.3s ease;
            z-index: 999;

        }

        }

        .content-wrapper {

        }

            background-color: white;
            border-radius: 8px;

            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;

            .sidebar {

                max-width: 280px;
            }

            .main-content {
                left: 0;
            }

                pointer-events: none;

        }

<header class="header">

</header>

                </div>

                <div class="form-group">
                    <label>재배환경</label>
                    <div class="tag-container">

                </div>

                        <label class="tag-item"><input type="checkbox" name="res" value="바이러스"> 바이러스</label>
                        <label class="tag-item"><input type="checkbox" name="res" value="시들음병"> 시들음병</label>
                        <label class="tag-item"><input type="checkbox" name="res" value="역병"> 역병</label>
                        <label class="tag-item"><input type="checkbox" name="res" value="무름병"> 무름병</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>생육 및 숙기</label>
                    <div class="tag-container">

                        <label class="tag-item"><input type="checkbox" name="growth" value="극조생"> 극조생</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>과실품질</label>
                    <div class="tag-container">

                    </div>
                </div>

                        <input type="text" class="input-text" id="imageUrl" placeholder="https://example.com/image.jpg">
                        <div class="preview-box">
                            <span class="preview-placeholder" id="previewText">이미지 URL을 입력하면<br>미리보기가 표시됩니다.</span>
                            <img id="previewImg" src="" alt="미리보기">
                        </div>
                    </div>
                </div>
            </form>

                <button class="btn btn-save" onclick="handleDraft()">임시저장</button>
                <button class="btn btn-add" id="submitBtnBottom" onclick="handleSubmit()">+ 등록하기</button>
            </div>
        </div>
    </div>
</main>

                quality: ["저장성우수", "착색우수"],
                conv: ["착과용이", "밀식적응"]
            }
        },
        {
            id: 7,
            name: "청운무",
            category: "무",
            desc: "뿌리가 매끈하고 바람들이가 적어 저장성이 매우 뛰어난 가을 무입니다.",
            imageUrl: "https://images.unsplash.com/photo-1592187270271-9a4b84faa228?auto=format&fit=crop&w=400&q=80",
            tags: {
                env: ["노지", "고랭지"],
                res: ["시들음병"],
                growth: ["만생종"],
                quality: ["저장성우수", "대과종"],
                conv: ["작업용이"]
            }
        },
        {
            id: 8,
            name: "썸머킹토마토",
            category: "토마토",
            desc: "여름철 고온기에도 착과가 잘 되고 단단하여 유통성이 좋은 완숙 토마토입니다.",
            imageUrl: "https://images.unsplash.com/photo-1592924357228-91a4daadcfea?auto=format&fit=crop&w=400&q=80",
            tags: {
                env: ["시설하우스"],
                res: ["시들음병", "바이러스", "역병"],
                growth: ["중생종"],
                quality: ["고당도", "저장성우수"],
                conv: ["초세강"]
            }
        },
        {
            id: 9,
            name: "대학찰옥수수",
            category: "옥수수",
            desc: "껍질이 얇아 식감이 부드럽고 쫀득쫀득한 맛이 일품인 찰옥수수입니다.",
            imageUrl: "https://images.unsplash.com/photo-1551754655-cd27e38d2076?auto=format&fit=crop&w=400&q=80",
            tags: {
                env: ["노지", "가정원예"],
                res: [],
                growth: ["조생종"],
                quality: ["고당도"],
                conv: ["초세강", "밀식적응"]
            }
        }
    ];

    // 태그 카테고리 정의
    const tagCategories = ['env', 'res', 'growth', 'quality', 'conv'];

    // ----------------------------------------------------
    // [초기화 및 이벤트 리스너]
    // ----------------------------------------------------
    document.addEventListener('DOMContentLoaded', function() {
        const imageUrlInput = document.getElementById('imageUrl');
        const previewImg = document.getElementById('previewImg');
        const previewText = document.getElementById('previewText');

        // 이미지 미리보기 함수
        function updateImagePreview(url) {
            if (url && url.trim() !== '') {
                previewImg.src = url;
                previewImg.style.display = 'block';
                previewText.style.display = 'none';

                previewImg.onerror = function() {
                    previewImg.style.display = 'none';
                    previewText.style.display = 'block';
                    previewText.innerText = "이미지를 불러올 수 없습니다.";
                };
            } else {
                previewImg.style.display = 'none';
                previewText.style.display = 'block';
                previewText.innerHTML = "이미지 URL을 입력하면<br>미리보기가 표시됩니다.";
            }
        }

        imageUrlInput.addEventListener('input', (e) => updateImagePreview(e.target.value));

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (productId) {
            console.log('수정 모드 진입: ID = ' + productId);
            initEditMode(parseInt(productId));
        } else {
            checkDraft();
        }

        // 수정 모드 초기화
        function initEditMode(id) {
            document.getElementById('pageTitle').innerText = '품종 정보 수정';
            document.getElementById('submitBtnTop').innerText = '수정 완료';
            document.getElementById('submitBtnBottom').innerText = '수정 완료';

            const product = products.find(p => p.id === id);
            if (product) {
                // 기본 정보
                document.getElementById('prodName').value = product.name;
                document.getElementById('prodCategory').value = product.category;
                document.getElementById('prodDesc').value = product.desc;
                document.getElementById('imageUrl').value = product.imageUrl;
                updateImagePreview(product.imageUrl);

                // [추가] 가격 정보 로딩
                if(product.priceData) {
                    document.getElementById('prodAmount').value = product.priceData.amount;
                    document.getElementById('prodUnit').value = product.priceData.unit;
                    document.getElementById('prodPrice').value = product.priceData.price;
                }

                // 태그
                if (product.tags) {
                    tagCategories.forEach(cat => {
                        const savedTags = product.tags[cat] || [];
                        const inputs = document.querySelectorAll(`input[name="${cat}"]`);
                        inputs.forEach(input => {
                            if (savedTags.includes(input.value)) {
                                input.checked = true;
                            }
                        });
                    });
                }
            }
        }

        // 임시저장 불러오기
        function checkDraft() {
            const savedDraft = localStorage.getItem('adminDraft');
            if (savedDraft) {
                if (confirm('작성 중이던 임시저장 데이터가 있습니다. 불러오시겠습니까?')) {
                    const data = JSON.parse(savedDraft);

                    document.getElementById('prodName').value = data.name || '';
                    document.getElementById('prodCategory').value = data.category || '';
                    document.getElementById('prodDesc').value = data.desc || '';
                    document.getElementById('imageUrl').value = data.imageUrl || '';
                    updateImagePreview(data.imageUrl);

                    // [추가] 가격 정보 복구
                    if(data.priceData) {
                        document.getElementById('prodAmount').value = data.priceData.amount || '';
                        document.getElementById('prodUnit').value = data.priceData.unit || '립';
                        document.getElementById('prodPrice').value = data.priceData.price || '';
                    }

                    if (data.tags) {
                        tagCategories.forEach(cat => {
                            const savedTags = data.tags[cat] || [];
                            const inputs = document.querySelectorAll(`input[name="${cat}"]`);
                            inputs.forEach(input => {
                                if (savedTags.includes(input.value)) {
                                    input.checked = true;
                                }
                            });
                        });
                    }
                }
            }
        }
    });

    // ----------------------------------------------------
    // [기능 함수]
    // ----------------------------------------------------

    // 폼 데이터 수집
    function getFormData() {
        const tagsObj = {};
        tagCategories.forEach(cat => {
            const checked = document.querySelectorAll(`input[name="${cat}"]:checked`);
            tagsObj[cat] = Array.from(checked).map(cb => cb.value);
        });

        return {
            name: document.getElementById('prodName').value,
            category: document.getElementById('prodCategory').value,
            desc: document.getElementById('prodDesc').value,
            imageUrl: document.getElementById('imageUrl').value,
            // [추가] 가격 정보 수집
            priceData: {
                amount: document.getElementById('prodAmount').value,
                unit: document.getElementById('prodUnit').value,
                price: document.getElementById('prodPrice').value
            },
            tags: tagsObj
        };
    }

    function handleDraft() {
        const data = getFormData();
        localStorage.setItem('adminDraft', JSON.stringify(data));
        alert('임시저장이 완료되었습니다.');
    }

    function handleCancel() {
        if (confirm('작성을 취소하고 목록으로 돌아가시겠습니까?\n(임시저장된 데이터도 함께 삭제됩니다)')) {
            localStorage.removeItem('adminDraft');
            location.href = 'admin_list.html';
        }
    }

    function handleSubmit() {
        const data = getFormData();

        if (!data.name.trim()) {
            alert('품종명은 필수 입력입니다.');
            document.getElementById('prodName').focus();
            return;
        }
        if (!data.category) {
            alert('품목(카테고리)를 선택해주세요.');
            document.getElementById('prodCategory').focus();
            return;
        }

        // [선택] 가격 입력 확인
        if (!data.priceData.price) {
            if(!confirm('단가가 입력되지 않았습니다. 계속 진행하시겠습니까?')) return;
        }

        const isEditMode = document.getElementById('submitBtnTop').innerText === '수정 완료';

        if (isEditMode) {
            alert('품종 정보가 성공적으로 수정되었습니다.');
        } else {
            alert('새로운 품종이 등록되었습니다.');
            localStorage.removeItem('adminDraft');
        }

        location.href = 'admin_list.html';
    }

    // 사이드바 토글
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');

    menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('hidden');
        mainContent.classList.toggle('expanded');
    });
</script>
