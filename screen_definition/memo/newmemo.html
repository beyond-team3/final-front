<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 영업 브리핑</title>
    <style>
        /* --- 기본 및 레이아웃 설정 --- */
        :root {
            --primary-color: #2563eb;
            --background-color: #f1f5f9;
            --card-background-color: #ffffff;
            --text-color-primary: #1e293b;
            --text-color-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color-primary);
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 반응형 메인 컨테이너 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            gap: 24px;
        }

        /* --- 카드 공통 스타일 --- */
        .card {
            background-color: var(--card-background-color);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            padding: 24px;
        }

        /* --- 1. 상단 고객 정보 카드 --- */
        .customer-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .customer-card-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
        }

        .customer-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-item .label {
            font-size: 0.875rem;
            color: var(--text-color-secondary);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .detail-item .value {
            font-size: 1rem;
            font-weight: 600;
        }

        .detail-item .value .badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 700;
            display: inline-block;
        }

        .badge.nursery { background-color: #dcfce7; color: #166534; }
        .badge.distributor { background-color: #dbeafe; color: #1e40af; }
        .badge.grade-vip { background-color: #fef9c3; color: #854d0e; }

        /* --- 2. AI 영업 브리핑 카드 --- */
        .briefing-card h2 {
            font-size: 1.25rem;
            margin-bottom: 8px;
        }

        /* 브리핑 생성 전 UI */
        #briefing-placeholder {
            text-align: center;
            padding: 40px 0;
        }

        #briefing-placeholder p {
            color: var(--text-color-secondary);
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        /* 로딩 스피너 */
        #spinner {
            display: none; /* 초기에는 숨김 */
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary-color);
            animation: spin 1s ease infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 브리핑 생성 후 UI */
        #briefing-content {
            display: none; /* 초기에는 숨김 */
        }

        .briefing-meta {
            font-size: 0.875rem;
            color: var(--text-color-secondary);
            margin-bottom: 24px;
        }

        .briefing-section {
            margin-bottom: 24px;
        }
        .briefing-section:last-child {
            margin-bottom: 0;
        }

        .briefing-section h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 12px;
            padding-left: 12px;
            border-left: 3px solid var(--primary-color);
        }

        .briefing-section p {
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap; /* 줄바꿈 유지 */
            padding: 0 4px;
        }

        /* --- 3. 최근 메모 목록 --- */
        .memo-list-card h2 {
            font-size: 1.25rem;
            margin-bottom: 16px;
        }

        .memo-list {
            list-style: none;
        }

        .memo-item {
            padding: 16px 8px;
            border-bottom: 1px solid var(--border-color);
        }
        .memo-item:first-child {
            padding-top: 0;
        }
        .memo-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .memo-meta {
            font-size: 0.8rem;
            color: var(--text-color-secondary);
            margin-bottom: 8px;
        }

        .memo-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .memo-snippet {
            font-size: 0.9rem;
            color: var(--text-color-secondary);
            /* 긴 텍스트 자르기 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- 반응형 디자인 --- */
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }
            .customer-details {
                grid-template-columns: 1fr 1fr;
            }
            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<main class="container">
    <!-- 1. 고객 정보 카드 -->
    <section class="card customer-card" id="customer-info"></section>

    <!-- 2. AI 영업 브리핑 카드 -->
    <section class="card briefing-card">
        <h2>AI 전략 브리핑</h2>

        <!-- 브리핑 생성 전 표시될 영역 -->
        <div id="briefing-placeholder">
            <p>브리핑이 생성되지 않았습니다.</p>
            <button id="generate-briefing-btn" class="btn-primary">브리핑 생성하기</button>
        </div>

        <!-- 로딩 스피너 -->
        <div id="spinner"></div>

        <!-- 브리핑 생성 후 표시될 영역 -->
        <div id="briefing-content">
            <p class="briefing-meta" id="briefing-date"></p>
            <div class="briefing-section">
                <h3>고객 현재 상황</h3>
                <p id="briefing-situation"></p>
            </div>
            <div class="briefing-section">
                <h3>최근 주요 이슈</h3>
                <p id="briefing-issues"></p>
            </div>
            <div class="briefing-section">
                <h3>추천 대응 전략</h3>
                <p id="briefing-strategy"></p>
            </div>
        </div>
    </section>

    <!-- 3. 최근 메모 목록 -->
    <section class="card memo-list-card">
        <h2>최근 메모 목록</h2>
        <ul class="memo-list" id="memo-list-container"></ul>
    </section>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function () {

        // --- Mock 데이터 ---

        // 1. 고객 정보
        const customerData = {
            name: "(주)푸른농장",
            type: "육묘장",
            typeCode: "nursery",
            region: "충남 논산",
            grade: "VIP",
            gradeCode: "vip",
            lastVisit: "2024년 5월 10일"
        };

        // 2. AI 브리핑 (생성 후 채워질 데이터)
        const mockBriefing = {
            date: "2024년 5월 28일",
            situation:
                "• 최근 'THE강한탄청양고추' 품종에 대한 문의가 증가했으나, 경쟁사(아시아종묘)의 'PR왕' 품종 프로모션으로 인해 일부 이탈 가능성이 보임.\n" +
                "• 작년 대비 고추 재배 면적 15% 확대. 토마토 재배는 10% 축소.",
            issues:
                "• 경쟁사의 공격적인 단가 할인 및 샘플 제공에 대해 우려를 표함.\n" +
                "• 'TS탑스타토마토' 품종의 초기 생육 부진에 대한 클레임이 있었으나, 현장 방문 후 재배 환경 문제로 확인 및 해결 완료.",
            strategy:
                "• 'THE강한탄청양고추'의 탄저병 저항성과 높은 수확량을 강조하여 차별점을 부각.\n" +
                "• 신규 품종 '티탄불패고추'의 샘플을 제공하여 고객의 관심을 유도하고, 경쟁사 품종과의 비교 재배를 제안.\n" +
                "• 토마토 재배 면적 감소에 따라, 수박, 오이 등 대체 작물 품종 포트폴리오를 함께 제안하여 추가 매출 기회 확보."
        };

        // 3. 최근 메모
        const recentMemos = [
            {
                date: "2024-05-10",
                title: "정기 방문 및 하반기 품종 논의",
                snippet: "김 대표님과 하반기 주력 품종으로 '티탄불패고추'와 '통큰싱싱배추'에 대해 논의함. 경쟁사 동향 전달 및..."
            },
            {
                date: "2024-04-22",
                title: "토마토 생육 부진 클레임 처리",
                snippet: "현장 방문 결과, 양액 농도 문제로 확인. 해결 방안 제시 후 고객 만족. 신뢰도 상승 기회로..."
            },
            {
                date: "2024-03-15",
                title: "신규 품종 'THE강한탄청양고추' 소개",
                snippet: "샘플 전달 및 재배 가이드 설명. 초기 반응 긍정적. 주변 육묘장에도 추천 의사 있음."
            }
        ];

        // --- 데이터 화면에 렌더링 ---

        // 1. 고객 정보 렌더링
        function renderCustomerInfo() {
            const container = document.getElementById('customer-info');
            container.innerHTML = `
                    <div class="customer-card-header">
                        <h1>${customerData.name}</h1>
                    </div>
                    <div class="customer-details">
                        <div class="detail-item">
                            <span class="label">고객 유형</span>
                            <span class="value">
                                ${customerData.type}
                                <span class="badge ${customerData.typeCode}">${customerData.type}</span>
                            </span>
                        </div>
                        <div class="detail-item">
                            <span class="label">지역</span>
                            <span class="value">${customerData.region}</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">거래 등급</span>
                            <span class="value">
                                ${customerData.grade}
                                <span class="badge grade-${customerData.gradeCode}">${customerData.grade}</span>
                            </span>
                        </div>
                        <div class="detail-item">
                            <span class="label">마지막 방문일</span>
                            <span class="value">${customerData.lastVisit}</span>
                        </div>
                    </div>
                `;
        }

        // 2. 최근 메모 렌더링
        function renderRecentMemos() {
            const listContainer = document.getElementById('memo-list-container');
            listContainer.innerHTML = recentMemos
                .map(
                    (memo) => `
                    <li class="memo-item">
                        <div class="memo-meta">${memo.date}</div>
                        <div class="memo-title">${memo.title}</div>
                        <div class="memo-snippet">${memo.snippet}</div>
                    </li>
                `
                )
                .join('');
        }

        // 3. 브리핑 생성 버튼 동작
        function setupBriefingButton() {
            const btn = document.getElementById('generate-briefing-btn');
            const placeholder = document.getElementById('briefing-placeholder');
            const spinner = document.getElementById('spinner');
            const content = document.getElementById('briefing-content');

            const dateEl = document.getElementById('briefing-date');
            const situationEl = document.getElementById('briefing-situation');
            const issuesEl = document.getElementById('briefing-issues');
            const strategyEl = document.getElementById('briefing-strategy');

            btn.addEventListener('click', function () {
                // placeholder 숨기고 스피너 표시
                placeholder.style.display = 'none';
                spinner.style.display = 'block';

                // 실제라면 여기서 API 호출
                setTimeout(function () {
                    // 스피너 숨기고 컨텐츠 표시
                    spinner.style.display = 'none';
                    content.style.display = 'block';

                    // mock 데이터 바인딩
                    dateEl.textContent = mockBriefing.date + ' 기준 브리핑';
                    situationEl.textContent = mockBriefing.situation;
                    issuesEl.textContent = mockBriefing.issues;
                    strategyEl.textContent = mockBriefing.strategy;
                }, 1200);
            });
        }

        // 초기 렌더링
        renderCustomerInfo();
        renderRecentMemos();
        setupBriefingButton();
    });
</script>
</body>
</html>
