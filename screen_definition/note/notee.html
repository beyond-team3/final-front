<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>종자 영업 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://rsms.me/inter/inter.css');
        :root { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }

        body { background-color: #f8fafc; overflow: hidden; }
        .header { background-color: #1e293b; }
        .sidebar { background-color: #334155; transform: translateX(0); transition: transform 0.3s ease-in-out; }
        .sidebar.hidden { transform: translateX(-100%); }
        .main-content { margin-left: 250px; transition: margin-left 0.3s ease-in-out; }
        .main-content.expanded { margin-left: 0; }
        .nav-item.active { background-color: #475569; border-left-color: #38bdf8; }
        .nav-item:hover { background-color: #475569; }
        .loader { border-top-color: #38bdf8; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-overlay { background-color: rgba(0,0,0,0.5); }
    </style>
</head>
<body class="text-slate-800">

<header class="header fixed top-0 left-0 right-0 h-16 text-white flex items-center px-6 z-40 shadow-md">
    <button class="menu-button text-2xl mr-4" id="menuToggle"><i class="fas fa-bars"></i></button>
    <h1 class="text-xl font-bold">B2B 종자 영업 CRM</h1>
</header>

<aside class="sidebar fixed top-16 left-0 w-64 h-[calc(100vh-4rem)] text-slate-200 z-30 overflow-y-auto" id="sidebar">
    <nav class="py-4">
        <div class="px-6 py-2 text-xs font-semibold text-slate-400 uppercase">메뉴</div>
        <a href="#" id="nav-write" class="nav-item flex items-center px-6 py-3 border-l-4 border-transparent" onclick="showSection('write')"><i class="fas fa-pen-to-square w-6 mr-2"></i> 활동 노트 작성</a>
        <a href="#" id="nav-list" class="nav-item flex items-center px-6 py-3 border-l-4 border-transparent" onclick="showSection('list')"><i class="fas fa-list-check w-6 mr-2"></i> 과거 기록 조회</a>
        <a href="#" id="nav-brief" class="nav-item flex items-center px-6 py-3 border-l-4 border-transparent" onclick="showSection('brief')"><i class="fas fa-bolt-lightning w-6 mr-2"></i> AI 영업 브리핑</a>
        <div class="px-6 py-4 mt-2 text-xs font-semibold text-slate-400 uppercase">고객사</div>
        <div id="sidebar-client-list"></div>
    </nav>
</aside>

<main class="main-content relative h-screen overflow-y-auto pt-16" id="mainContent">
    <div class="p-8">
        
        <!-- Note Creation Screen -->
        <div id="sec-write" class="screen-content">
            <h2 class="text-2xl font-bold mb-6">영업 활동 기록</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white p-8 rounded-lg shadow-sm">
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-2">고객처</label>
                                <select id="in-client" onchange="syncContracts('in')" class="w-full border-slate-300 p-3 rounded-md shadow-sm focus:border-sky-500 focus:ring-sky-500"></select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-2">활동 일자</label>
                                <input type="date" id="in-date" class="w-full border-slate-300 p-3 rounded-md shadow-sm focus:border-sky-500 focus:ring-sky-500">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-2">계약 건</label>
                            <select id="in-contract" class="w-full border-slate-300 p-3 rounded-md shadow-sm focus:border-sky-500 focus:ring-sky-500">
                                <option value="">계약 선택</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-2">미팅 내용</label>
                            <textarea id="in-content" rows="12" class="w-full border-slate-300 p-4 rounded-md shadow-sm focus:border-sky-500 focus:ring-sky-500 leading-relaxed" placeholder="고객과의 미팅, 통화 내용 등 상세한 활동 내용을 입력하세요..."></textarea>
                        </div>
                        <div class="flex justify-end">
                            <button onclick="saveNote()" id="saveBtn" class="bg-sky-600 text-white px-8 py-3 rounded-md font-bold hover:bg-sky-700 transition-colors flex items-center justify-center">
                                <i class="fas fa-save mr-2"></i> 저장 및 AI 분석
                            </button>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                    <h4 class="font-bold text-sky-600 mb-4 border-b pb-3 flex items-center"><i class="fas fa-sparkles mr-2"></i> AI 실시간 요약</h4>
                    <div id="realtime-summary" class="text-sm text-slate-500 italic">저장 시 AI가 핵심 내용을 요약합니다.</div>
                </div>
            </div>
        </div>

        <!-- Note List Screen -->
        <div id="sec-list" class="screen-content hidden">
            <h2 class="text-2xl font-bold mb-6">활동 기록 탐색</h2>
            <div class="bg-white p-5 rounded-lg shadow-sm border mb-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">고객사</label>
                        <select id="filter-client" onchange="syncContracts('filter'); renderNotes();" class="w-full border-slate-300 p-2 rounded text-sm shadow-sm focus:border-sky-500 focus:ring-sky-500"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">계약명</label>
                        <select id="filter-contract" onchange="renderNotes();" class="w-full border-slate-300 p-2 rounded text-sm shadow-sm focus:border-sky-500 focus:ring-sky-500"></select>
                    </div>
                    <div class="lg:col-span-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">날짜 범위</label>
                        <div class="flex items-center space-x-2">
                            <input type="date" id="filter-date-start" onchange="renderNotes()" class="w-full border-slate-300 p-2 rounded text-xs shadow-sm focus:border-sky-500 focus:ring-sky-500">
                            <span class="text-slate-400">~</span>
                            <input type="date" id="filter-date-end" onchange="renderNotes()" class="w-full border-slate-300 p-2 rounded text-xs shadow-sm focus:border-sky-500 focus:ring-sky-500">
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-4">
                     <div class="relative lg:col-span-3">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="search-keyword" oninput="renderNotes()" placeholder="고객명, 계약명, 요약 내용으로 검색..." class="w-full border-slate-300 p-2 pl-10 rounded text-sm shadow-sm focus:border-sky-500 focus:ring-sky-500">
                    </div>
                    <div class="flex space-x-2">
                        <select id="filter-sort" onchange="renderNotes()" class="w-full border-slate-300 p-2 rounded text-sm shadow-sm focus:border-sky-500 focus:ring-sky-500">
                            <option value="desc">최신순</option>
                            <option value="asc">오래된순</option>
                        </select>
                        <button onclick="resetFilters()" title="필터 초기화" class="w-10 bg-slate-200 text-slate-600 rounded text-sm hover:bg-slate-300 transition-colors"><i class="fas fa-rotate-left"></i></button>
                    </div>
                </div>
            </div>
            <div id="note-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </div>

        <!-- Sales Briefing Screen -->
        <div id="sec-brief" class="screen-content hidden">
             <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">AI 영업 브리핑</h2>
                <select id="brief-client-selector" onchange="loadBriefing(this.value)" class="text-sm font-normal border p-2 rounded bg-white shadow-sm outline-none w-64">
                    <option value="">브리핑 대상 선택</option>
                </select>
            </div>
            <div id="brief-view-container">
                <div id="brief-no-selection" class="py-20 text-center"><i class="fas fa-address-card text-6xl text-slate-200 mb-4"></i><p class="text-slate-400 font-medium">상단에서 고객사를 선택해 주세요.</p></div>
                <div id="brief-main-ui" class="hidden space-y-8">
                    <div class="bg-gradient-to-r from-slate-700 to-slate-800 p-8 rounded-lg text-white shadow-lg">
                        <div class="flex justify-between items-start">
                             <div><h3 id="b-client-name" class="text-3xl font-bold mb-1"></h3><p class="text-slate-300 text-sm">AI 전략 분석 리포트</p></div>
                             <span class="text-xs font-bold bg-sky-500/80 px-3 py-1 rounded-full">AI Model v3.2</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
                        <div class="lg:col-span-3 space-y-8">
                            <div class="bg-white p-6 rounded-lg shadow-sm border"><h4 class="font-bold text-slate-800 mb-4 text-lg flex items-center"><i class="fa-solid fa-arrows-to-dot w-6 mr-2 text-sky-500"></i>핵심 현황 및 최근 변화</h4><div id="b-status-change" class="text-sm text-slate-600 leading-relaxed space-y-2"></div></div>
                            <div class="bg-white p-6 rounded-lg shadow-sm border"><h4 class="font-bold text-slate-800 mb-4 text-lg flex items-center"><i class="fa-solid fa-chart-line w-6 mr-2 text-amber-500"></i>장기 패턴 및 특이사항</h4><div id="b-pattern" class="text-sm text-slate-600 leading-relaxed space-y-2"></div></div>
                        </div>
                        <div class="lg:col-span-2 space-y-8">
                            <div class="bg-emerald-50 border-emerald-200 border p-6 rounded-lg shadow-sm"><h4 class="font-bold text-emerald-800 mb-4 text-lg flex items-center"><i class="fa-solid fa-lightbulb w-6 mr-2 text-emerald-500"></i>AI 추천 전략</h4><div id="b-strategy" class="text-sm font-medium text-emerald-700"></div></div>
                            <div class="bg-white p-6 rounded-lg shadow-sm border"><h4 class="font-bold text-slate-800 mb-4 text-lg flex items-center"><i class="fa-solid fa-clock-rotate-left w-6 mr-2 text-slate-400"></i>최근 반영된 노트</h4><div id="b-recent-notes" class="text-sm space-y-3"></div></div>
                        </div>
                    </div>
                </div>
                <div id="brief-not-enough" class="hidden py-20 text-center bg-slate-50 rounded-lg"><i class="fas fa-hourglass-half text-5xl text-slate-300 mb-4"></i><h4 class="font-bold text-slate-500 mb-2">분석 데이터 부족</h4><p class="text-sm text-slate-400">해당 고객사의 분석 가능한 노트가 3개 이상 필요합니다.</p></div>
            </div>
        </div>
    </div>
</main>

<!-- Note Detail Modal -->
<div id="note-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div class="modal-overlay fixed inset-0" onclick="closeModal()"></div>
    <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col z-10">
        <div class="flex justify-between items-center p-5 border-b">
            <h3 class="text-xl font-bold">활동 노트 원문</h3>
            <button onclick="closeModal()" class="text-2xl text-slate-400 hover:text-slate-600">&times;</button>
        </div>
        <div class="p-8 overflow-y-auto">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p id="modal-client" class="text-xl font-bold text-sky-600"></p>
                    <p id="modal-contract" class="text-sm text-slate-500"></p>
                </div>
                <p id="modal-date" class="text-sm text-slate-400 font-medium"></p>
            </div>
            <div class="bg-slate-50 p-6 rounded-lg prose max-w-none">
                <pre id="modal-content" class="font-sans whitespace-pre-wrap text-slate-700"></pre>
            </div>
        </div>
        <div class="p-4 bg-slate-50 border-t text-right">
             <button onclick="closeModal()" class="bg-slate-500 text-white px-6 py-2 rounded-md font-bold hover:bg-slate-600">닫기</button>
        </div>
    </div>
</div>

<script>
    // --- DATABASE ---
    const db = {
        clients: {
            "c1": { name: "그린시드 육묘장", type: "육묘장" },
            "c2": { name: "미래농업 원예농협", type: "농협" },
            "c3": { name: "대산종묘", type: "대리점" },
            "c4": { name: "푸른들 종자", type: "대리점" },
            "c5": { name: "해오름 농원", type: "육묘장" },
        },
        contracts: {
            "c1": ["2026년 고추종자 공급", "여름 대목용 종자 수급"],
            "c2": ["지역특화 오이종자 계약", "정부지원 벼 종자 보급"],
            "c3": ["신품종 토마토 시범재배", "상토 및 비료 공급"],
            "c4": ["양파/대파 종자 총판", "월동배추 사전계약"],
            "c5": ["방울토마토 모종 계약"],
        },
        notes: [
            { id: 1, clientId: "c1", contract: "2026년 고추종자 공급", date: "2026-02-12", content: "차주 방문하여 고추 신품종 '빅파이어'의 샘플 전달 예정. 작년 탄저병 피해에 대한 우려가 크셔서, 저항성 품종에 대한 관심이 높음. '빅파이어'가 탄저병 및 칼라병 복합 저항성 품종임을 집중적으로 어필. 샘플 테스트 후 긍정적 반응일 시, 내년 주력 품종으로의 전환 가능성 타진.", summary: ["'빅파이어' 샘플 전달 약속", "탄저병 저항성에 높은 관심 확인", "차기 주력 품종 전환 가능성"] },
            { id: 2, clientId: "c2", contract: "지역특화 오이종자 계약", date: "2026-02-11", content: "원예농협 조합장님과 미팅. 기존 '백다다기' 품종의 작황 변동성에 대한 조합원 불만이 일부 접수됨. 새로운 품종으로 '여름청'을 제안. 내열성, 내병성이 우수하고 수확량이 안정적이라는 점을 데이터와 함께 설명. 소규모 시범재배 후, 조합원 대상 설명회 개최를 제안하여 긍정적인 답변을 받음.", summary: ["'백다다기' 품종 불만 접수", "'여름청' 품종 제안 및 데이터 설명", "시범재배 및 설명회 개최 합의"] },
            { id: 3, clientId: "c1", contract: "2026년 고추종자 공급", date: "2026-01-20", content: "유선 통화. 작년 납품했던 '슈퍼마니따' 품종의 발아율이 기대보다 낮았다는 클레임 제기. 원인 파악을 위해 육묘장 환경(온도, 습도, 상토)에 대한 정보를 요청. 당사 연구소에 데이터 전달하여 정확한 원인 분석 후 피드백 약속. 신뢰 회복이 우선.", summary: ["'슈퍼마ni따' 발아율 클레임", "육묘 환경 데이터 요청", "원인 분석 및 피드백 약속"] },
            { id: 4, clientId: "c3", contract: "신품종 토마토 시범재배", date: "2026-02-05", content: "시범재배 중인 'TY-마스터' 토마토의 생육 상태 점검. 전반적으로 양호하나, 일부 농가에서 착과 불량 현상 발생. 원인으로 수정벌 활동 저하가 의심되어, 수정벌 추가 투입 및 관리 요령 안내. 당도 및 경도 데이터는 우수하여 시장성은 높게 평가됨.", summary: ["'TY-마스터' 착과 불량 발생", "수정벌 관리 요령 안내", "품질 데이터 우수, 시장성 긍정"] },
            { id: 5, clientId: "c5", contract: "방울토마토 모종 계약", date: "2026-02-10", content: "신규 거래처인 해오름 농원 대표님과 첫 미팅. 기존 거래처의 잦은 납기 지연과 품질 문제로 불만이 많으셨음. 우리 회사의 안정적인 공급망과 철저한 품질관리 시스템을 강조. 'TY-생생' 품종 샘플 모종을 제공하고, 소량 발주부터 시작하기로 함.", summary: ["신규 거래처, 기존 업체에 불만", "안정적 공급 및 품질관리 강조", "'TY-생생' 샘플 제공 및 소량 발주"] },
            { id: 6, clientId: "c1", contract: "여름 대목용 종자 수급", date: "2026-02-01", content: "대목용 종자 '흥선대원'의 재고가 얼마 남지 않았다는 소식을 듣고 방문. 경쟁사에서 비슷한 품종을 더 저렴하게 제안했다는 정보를 입수. 우리는 가격 대신 품종의 순도와 발아율 보증을 강하게 어필. 결국 기존 물량에 5% 추가 계약 성공.", summary: ["경쟁사 저가 제안 정보 입수", "품질 우위로 대응", "5% 추가 계약 성공"] },
        ],
        briefings: {
            "c1": {
                statusChange: "<p>• 최근 '빅파이어' 고추 신품종에 대한 강한 도입 의지를 보임. 탄저병 저항성이 핵심 결정 요인으로 작용.</p><p>• 과거 '슈퍼마니따' 품종의 발아율 클레임 이력이 있어, 데이터 기반의 신뢰성 확보가 중요.</p>",
                pattern: "<p>• 안정적인 대량 공급처로서, 신품종 테스트에 적극적이나 품질 문제에 민감하게 반응하는 경향.</p><p>• 가격보다는 품종의 기능성(내병성, 수확량)을 더 중요하게 고려함.</p>",
                strategy: "차주 '빅파이어' 샘플 전달 시, 발아율 및 저항성 관련 공인 데이터를 반드시 함께 제공하여 과거 클레임에 대한 우려를 해소하고 전문성을 부각해야 함. 성공적인 테스트 이후, 주력 품종 전환을 위한 프로모션 제안 준비 필요.",
                recentNoteIds: [1, 3]
            }
        }
    };

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', init);

    function init() {
        const clientSelector = document.getElementById('in-client');
        const filterClient = document.getElementById('filter-client');
        const briefSelector = document.getElementById('brief-client-selector');
        const sidebarList = document.getElementById('sidebar-client-list');
        
        const clientIds = Object.keys(db.clients);

        // Populate selectors
        filterClient.innerHTML = '<option value="">모든 고객</option>';
        clientSelector.innerHTML = '<option value="">고객 선택</option>';
        clientIds.forEach(id => {
            const client = db.clients[id];
            [clientSelector, filterClient, briefSelector].forEach(sel => sel.add(new Option(client.name, id)));
            
            const div = document.createElement('a');
            div.href = "#";
            div.className = 'nav-item text-sm flex items-center px-6 py-2.5';
            div.innerHTML = `<i class="fas fa-store w-6 mr-2 text-slate-400"></i><span>${client.name}</span>`;
            div.onclick = (e) => { e.preventDefault(); showSection('brief'); loadBriefing(id); };
            sidebarList.appendChild(div);
        });

        document.getElementById('in-date').value = new Date().toISOString().split('T')[0];

        syncContracts('in');
        syncContracts('filter');
        renderNotes();
        showSection('write');
        
        document.getElementById('menuToggle').addEventListener('click', toggleSidebar);
    }
    
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('hidden');
        document.getElementById('mainContent').classList.toggle('expanded');
    }

    // --- NAVIGATION ---
    function showSection(id) {
        document.querySelectorAll('.screen-content').forEach(s => s.classList.add('hidden'));
        document.getElementById(`sec-${id}`).classList.remove('hidden');

        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const activeNav = document.getElementById(`nav-${id}`);
        if (activeNav) activeNav.classList.add('active');

        if(id === 'list') renderNotes();
    }

    // --- DATA & UI SYNC ---
    function syncContracts(type) {
        const clientId = document.getElementById(type === 'in' ? 'in-client' : 'filter-client').value;
        const select = document.getElementById(type === 'in' ? 'in-contract' : 'filter-contract');
        
        select.innerHTML = type === 'in' ? '<option value="">계약 선택</option>' : '<option value="">모든 계약</option>';
        if (clientId && db.contracts[clientId]) {
            db.contracts[clientId].forEach(c => select.add(new Option(c, c)));
        }
    }

    // --- NOTE CREATION ---
    async function saveNote() {
        const clientId = document.getElementById('in-client').value;
        const contract = document.getElementById('in-contract').value;
        const content = document.getElementById('in-content').value;
        const date = document.getElementById('in-date').value;

        if (!clientId || !content || !date) {
            alert("고객처, 활동 일자, 미팅 내용은 필수 입력 항목입니다.");
            return;
        }

        const btn = document.getElementById('saveBtn');
        btn.innerHTML = '<div class="loader w-5 h-5 border-2 rounded-full"></div>';
        btn.disabled = true;

        // Mock AI Summary Generation
        setTimeout(() => {
            const mockSummaries = [
                ["신규 품종 제안 및 긍정적 반응", "샘플 테스트 일정 조율", "경쟁사 동향 파악"],
                ["기존 계약 관련 클레임 접수", "원인 분석 및 해결 방안 제시", "후속 조치 약속"],
                ["단가 및 물량 협상 진행", "장기 공급 계약 가능성 타진", "결제 조건 확인"],
            ];
            const selectedSummary = mockSummaries[Math.floor(Math.random() * mockSummaries.length)];

            const newNote = {
                id: Date.now(),
                clientId,
                contract,
                content,
                summary: selectedSummary,
                date
            };
            db.notes.unshift(newNote);
            
            updateBriefing(newNote);

            document.getElementById('realtime-summary').innerHTML = `<ul class="list-disc list-inside space-y-1.5 text-slate-600">${selectedSummary.map(s => `<li>${s}</li>`).join('')}</ul>`;
            btn.innerHTML = '<i class="fas fa-save mr-2"></i> 저장 및 AI 분석';
            btn.disabled = false;
            document.getElementById('in-content').value = "";
            alert('성공적으로 저장되었습니다.');
        }, 800);
    }
    
    // --- NOTE LIST & FILTER ---
    function renderNotes() {
        const container = document.getElementById('note-grid');
        const fClient = document.getElementById('filter-client').value;
        const fContract = document.getElementById('filter-contract').value;
        const fStart = document.getElementById('filter-date-start').value;
        const fEnd = document.getElementById('filter-date-end').value;
        const fSort = document.getElementById('filter-sort').value;
        const kw = document.getElementById('search-keyword').value.toLowerCase();

        let filtered = db.notes.filter(n => {
            const clientName = db.clients[n.clientId].name.toLowerCase();
            const matchClient = !fClient || n.clientId === fClient;
            const matchContract = !fContract || n.contract === fContract;
            const matchDate = (!fStart || n.date >= fStart) && (!fEnd || n.date <= fEnd);
            const matchSearch = kw === '' || clientName.includes(kw) || n.contract.toLowerCase().includes(kw) || n.summary.join(' ').toLowerCase().includes(kw) || n.content.toLowerCase().includes(kw);
            return matchClient && matchContract && matchDate && matchSearch;
        });

        filtered.sort((a, b) => fSort === 'desc' ? b.id - a.id : a.id - b.id);

        if (filtered.length === 0) {
            container.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400"><i class="fas fa-box-open text-4xl mb-4"></i><p>조건에 맞는 기록이 없습니다.</p></div>';
            return;
        }

        container.innerHTML = filtered.map(n => `
            <div class="border rounded-lg p-5 shadow-sm bg-white hover:shadow-md hover:border-sky-300 transition-all">
                <div class="flex justify-between items-start mb-3">
                    <span class="font-bold text-sky-600">${db.clients[n.clientId].name}</span>
                    <span class="text-xs text-slate-400 font-medium">${n.date}</span>
                </div>
                <div class="bg-slate-50 p-4 rounded-md mb-4">
                    <p class="text-xs text-slate-500 font-bold mb-1.5">AI 요약</p>
                    <p class="text-sm text-slate-600 line-clamp-2">${n.summary.join(', ')}</p>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <span class="text-slate-500 truncate max-w-[150px]"><i class="fa-regular fa-file-lines mr-2 text-slate-400"></i>${n.contract || '일반 상담'}</span>
                    <button onclick="showNoteModal(${n.id})" class="text-sky-500 font-bold hover:underline">원문 보기</button>
                </div>
            </div>
        `).join('');
    }
    
    function resetFilters() {
        document.getElementById('filter-client').value = '';
        document.getElementById('filter-contract').innerHTML = '<option value="">모든 계약</option>';
        document.getElementById('filter-date-start').value = '';
        document.getElementById('filter-date-end').value = '';
        document.getElementById('filter-sort').value = 'desc';
        document.getElementById('search-keyword').value = '';
        renderNotes();
    }
    
    // --- MODAL ---
    function showNoteModal(noteId) {
        const note = db.notes.find(n => n.id === noteId);
        if (!note) return;
        document.getElementById('modal-client').innerText = db.clients[note.clientId].name;
        document.getElementById('modal-contract').innerText = note.contract || '일반 상담';
        document.getElementById('modal-date').innerText = note.date;
        document.getElementById('modal-content').innerText = note.content;
        document.getElementById('note-modal').classList.remove('hidden');
        document.getElementById('note-modal').classList.add('flex');
    }

    function closeModal() {
        document.getElementById('note-modal').classList.add('hidden');
        document.getElementById('note-modal').classList.remove('flex');
    }
    
    // --- BRIEFING ---
    function loadBriefing(clientId) {
        const briefSelector = document.getElementById('brief-client-selector');
        const noSel = document.getElementById('brief-no-selection');
        const mainUI = document.getElementById('brief-main-ui');
        const notEnough = document.getElementById('brief-not-enough');

        briefSelector.value = clientId;
        if (!clientId) {
            [mainUI, notEnough].forEach(el => el.classList.add('hidden'));
            noSel.classList.remove('hidden');
            return;
        }

        const clientNotes = db.notes.filter(n => n.clientId === clientId);
        noSel.classList.add('hidden');

        if (clientNotes.length < 3) {
            mainUI.classList.add('hidden');
            notEnough.classList.remove('hidden');
        } else {
            notEnough.classList.add('hidden');
            mainUI.classList.remove('hidden');
            document.getElementById('b-client-name').innerText = db.clients[clientId].name;
            
            const briefing = db.briefings[clientId] || generateBriefing(clientId);
            if (!db.briefings[clientId]) db.briefings[clientId] = briefing;
            
            document.getElementById('b-status-change').innerHTML = briefing.statusChange;
            document.getElementById('b-pattern').innerHTML = briefing.pattern;
            document.getElementById('b-strategy').innerHTML = briefing.strategy;

            const recentNotesHtml = briefing.recentNoteIds
                .map(id => db.notes.find(n => n.id === id))
                .filter(Boolean)
                .map(n => `
                    <div class="border-l-2 pl-3 border-slate-200">
                        <p class="text-xs text-slate-400 font-medium">${n.date}</p>
                        <p class="text-slate-600 font-medium">${n.summary[0]}</p>
                    </div>
                `).join('');
            document.getElementById('b-recent-notes').innerHTML = recentNotesHtml;
        }
    }
    
    function generateBriefing(clientId) {
        // Mock function to generate a full briefing from scratch
        const clientNotes = db.notes.filter(n => n.clientId === clientId).sort((a, b) => b.id - a.id);
        const lastNote = clientNotes[0];
        const secondLastNote = clientNotes[1];

        const briefing = {
            statusChange: `<p>• 가장 최근 활동(${lastNote.date})에서 '${lastNote.summary[0]}' 이슈가 논의되었습니다.</p><p>• 이는 직전 활동('${secondLastNote.summary[0]}')에서 이어지는 맥락으로, 고객의 관심사가 구체화되고 있음을 시사합니다.</p>`,
            pattern: "<p>• 해당 고객은 신기술 및 고기능성 품종에 대한 테스트에 개방적입니다.</p><p>• 가격 협상보다는 안정적인 품질과 데이터 기반의 신뢰를 우선시하는 경향이 뚜렷합니다.</p>",
            strategy: "현재 고객의 가장 큰 관심사에 집중하여 맞춤형 후속 조치를 제안하는 것이 중요합니다. 예를 들어, 샘플 테스트 결과나 추가 데이터를 신속하게 제공하여 전문성을 부각시키십시오.",
            recentNoteIds: clientNotes.slice(0, 2).map(n => n.id)
        };
        return briefing;
    }
    
    function updateBriefing(newNote) {
        // Mock function to update a briefing with a new note
        const { clientId } = newNote;
        const clientNotes = db.notes.filter(n => n.clientId === clientId);
        if (clientNotes.length < 3) return; // Not enough data to create/update briefing

        const oldBriefing = db.briefings[clientId] || generateBriefing(clientId);

        const updatedBriefing = {
            statusChange: `<p>• (신규) ${newNote.date} 활동: '${newNote.summary[0]}' 관련 논의가 진행되었습니다.</p>` + oldBriefing.statusChange,
            pattern: oldBriefing.pattern, // Pattern is assumed to be long-term, so not updated frequently
            strategy: `(신규 제안) '${newNote.summary[0]}' 건과 관련하여, 다음 미팅 시 ${newNote.summary[1]}에 대한 구체적인 안을 제시하는 것이 효과적일 것으로 보입니다.`,
            recentNoteIds: [newNote.id, ...oldBriefing.recentNoteIds].slice(0, 2)
        };

        db.briefings[clientId] = updatedBriefing;
    }

</script>
